services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kff
      POSTGRES_PASSWORD: kff
      POSTGRES_DB: kff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kff -d kff"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kff:kff@db:5432/kff
    volumes:
      # Mount source for hot reload — file changes restart uvicorn automatically
      - .:/app
      # Prevent the container's site-packages from being overwritten by the mount
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
